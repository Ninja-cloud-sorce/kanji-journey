<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="r" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B4C6FC"/>
      <stop offset="100%" stop-color="#5E6AD2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0A0A14"/>
  <!-- Outer open arc -->
  <circle cx="16" cy="16" r="11"
    stroke="url(#r)" stroke-width="2"
    stroke-linecap="round"
    stroke-dasharray="57 12"
    stroke-dashoffset="-4"
  />
  <!-- Inner square (回) -->
  <rect x="10" y="10" width="12" height="12" rx="2.5"
    stroke="#5E6AD2" stroke-width="1.8" fill="none"
  />
  <!-- K mark -->
  <line x1="16" y1="12" x2="16" y2="20" stroke="#B4C6FC" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="20" y2="12" stroke="#B4C6FC" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="20" y2="20" stroke="#B4C6FC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#B4C6FC"/>
</svg>
